kind: Fixed
body: 'Eliminated the stack-view refresh storm during multi-step git operations (issue #71), from any source. Extension-initiated operations (submit, restack, sync, branch/commit commands) now hold watcher refreshes for their whole duration and refresh once on completion. Operations the extension cannot see (e.g. `gs repo sync` run in a terminal) are bounded by a leading-edge rate limit — a lone change still refreshes instantly, but sustained ref churn coalesces to at most one refresh every 2s. Background watcher refreshes are now also silent: the refreshing indicator only shows for user-initiated refreshes, and a refresh that finds no actual state change no longer re-renders the view at all.'
