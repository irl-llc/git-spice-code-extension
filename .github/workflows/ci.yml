name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch so stacked PRs (which target
  # other feature branches, not main) also get CI.
  pull_request:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to marketplace (auto-increment version)'
        required: false
        type: choice
        options:
          - 'none'
          - 'patch'
          - 'minor'
          - 'major'
        default: 'none'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          # Snapshot PNGs in src/test/e2e/playwright/*.spec.ts-snapshots/
          # are git-lfs-tracked.
          lfs: true

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Aligned with Dockerfile GO_VERSION; gs source's go.mod requires
          # Go 1.23+ to parse its `go 1.26.x` directive.
          go-version: '1.25'

      - name: Cache pinned gs binary
        uses: actions/cache@v4
        with:
          path: .gs
          key: gs-${{ runner.os }}-${{ hashFiles('.gs-version') }}

      - name: Install dependencies
        run: npm ci

      - name: Fetch and build pinned gs binary
        run: npm run gs:fetch

      - name: Format check
        run: npm run format:check

      # Advisory annotations only — posts inline lint comments for reviewer
      # context. The real gate is the "Lint (fail on warnings)" step below,
      # which runs the same `eslint --max-warnings=0` as the local husky
      # pre-commit hook, so CI, reviewdog, and local checks all agree.
      # reviewdog can exit non-zero on its own comment-management (e.g. 404
      # deleting a stale annotation after a force-push), so don't let that
      # fail the build.
      - name: Lint with reviewdog annotations
        continue-on-error: true
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-review
          eslint_flags: 'src/ --max-warnings=0'
          fail_level: none

      # Hard gate: matches the husky pre-commit hook (`eslint --max-warnings=0`).
      - name: Lint (fail on warnings)
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Compile tests
        run: npm run compile-tests

      - name: Run unit tests
        id: unit-tests
        run: npm run test:unit -- --reporter json --reporter-option output=test-results.json
        continue-on-error: true

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: test-results.json
          reporter: mocha-json

      - name: Fail if tests failed
        if: steps.unit-tests.outcome == 'failure'
        run: exit 1

      - name: Run E2E tests
        id: e2e-tests
        run: xvfb-run -a npm run test:e2e
        env:
          DISPLAY: ':99.0'
          GIT_SPICE_BIN: ${{ github.workspace }}/.gs/bin/gs
        continue-on-error: true

      - name: Cache Docker test image layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-buildx-cache
          key: docker-buildx-${{ runner.os }}-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            docker-buildx-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Run buildx directly (not docker/build-push-action) so we can retry:
      # the base-image manifest resolve against mcr.microsoft.com intermittently
      # 403s, and the layer cache doesn't avoid that registry round-trip.
      # Truncated exponential backoff with full jitter.
      - name: Build Playwright Docker image
        shell: bash
        run: |
          set -uo pipefail
          build() {
            docker buildx build \
              --file Dockerfile \
              --tag git-spice-playwright:v1.60.0-jammy \
              --load \
              --cache-from type=local,src=/tmp/.docker-buildx-cache \
              --cache-to type=local,dest=/tmp/.docker-buildx-cache-new,mode=max \
              .
          }
          attempt=0
          max_attempts=5
          base=5 # seconds
          cap=60 # truncate the exponential window here
          until build; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "buildx failed after ${attempt} attempts" >&2
              exit 1
            fi
            window=$((base * (2 ** (attempt - 1))))
            [ "$window" -gt "$cap" ] && window=$cap
            delay=$((RANDOM % (window + 1))) # full jitter in [0, window]
            echo "buildx attempt ${attempt} failed; retrying in ${delay}s (window ${window}s)" >&2
            sleep "$delay"
          done

      - name: Move Docker cache (per actions/cache best practice)
        run: rm -rf /tmp/.docker-buildx-cache && mv /tmp/.docker-buildx-cache-new /tmp/.docker-buildx-cache

      - name: Run Playwright BDD + snapshot tests (Linux container)
        id: playwright-tests
        run: npm run test:e2e:playwright:docker
        continue-on-error: true

      - name: Upload Playwright artifacts on failure
        if: steps.playwright-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Fail if Playwright tests failed
        if: steps.playwright-tests.outcome == 'failure'
        run: exit 1

      - name: Package extension
        run: npm run package

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: '*.vsix'
          retention-days: 7

      - name: Publish to VS Code Marketplace (auto-increment)
        if: success() && github.event.inputs.publish != 'none' && github.event.inputs.publish != '' && matrix.node-version == '22.x'
        run: npm run deploy:${{ github.event.inputs.publish }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX (auto-increment)
        if: success() && github.event.inputs.publish != 'none' && github.event.inputs.publish != '' && matrix.node-version == '22.x'
        run: npm run deploy:openvsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # Publish to the Marketplace + Open VSX when a human creates a GitHub Release.
  # Gated on the build job so we never publish a red build. The scheduled
  # auto-release path does NOT come through here — GitHub won't re-trigger a
  # workflow from a Release created with the default GITHUB_TOKEN (issue #29),
  # so auto-release.yml calls the same reusable workflow itself.
  publish:
    needs: build
    if: github.event_name == 'release'
    uses: ./.github/workflows/publish.yml
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
