name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to marketplace (auto-increment version)'
        required: false
        type: choice
        options:
          - 'none'
          - 'patch'
          - 'minor'
          - 'major'
        default: 'none'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          # Snapshot PNGs in src/test/e2e/playwright/*.spec.ts-snapshots/
          # are git-lfs-tracked.
          lfs: true

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Aligned with Dockerfile GO_VERSION; gs source's go.mod requires
          # Go 1.23+ to parse its `go 1.26.x` directive.
          go-version: '1.25'

      - name: Cache pinned gs binary
        uses: actions/cache@v4
        with:
          path: .gs
          key: gs-${{ runner.os }}-${{ hashFiles('.gs-version') }}

      - name: Install dependencies
        run: npm ci

      - name: Fetch and build pinned gs binary
        run: npm run gs:fetch

      - name: Format check
        run: npm run format:check

      - name: Lint with reviewdog annotations
        uses: reviewdog/action-eslint@v1
        with:
          reporter: github-pr-review
          eslint_flags: 'src/'
          fail_level: none

      - name: Lint (fail on error)
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Compile tests
        run: npm run compile-tests

      - name: Run unit tests
        id: unit-tests
        run: npm run test:unit -- --reporter json --reporter-option output=test-results.json
        continue-on-error: true

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: test-results.json
          reporter: mocha-json

      - name: Fail if tests failed
        if: steps.unit-tests.outcome == 'failure'
        run: exit 1

      - name: Run E2E tests
        id: e2e-tests
        run: xvfb-run -a npm run test:e2e
        env:
          DISPLAY: ':99.0'
          GIT_SPICE_BIN: ${{ github.workspace }}/.gs/bin/gs
        continue-on-error: true

      - name: Cache Docker test image layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-buildx-cache
          key: docker-buildx-${{ runner.os }}-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            docker-buildx-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Playwright Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: git-spice-playwright:v1.60.0-jammy
          cache-from: type=local,src=/tmp/.docker-buildx-cache
          cache-to: type=local,dest=/tmp/.docker-buildx-cache-new,mode=max

      - name: Move Docker cache (per actions/cache best practice)
        run: rm -rf /tmp/.docker-buildx-cache && mv /tmp/.docker-buildx-cache-new /tmp/.docker-buildx-cache

      - name: Run Playwright BDD + snapshot tests (Linux container)
        id: playwright-tests
        run: npm run test:e2e:playwright:docker
        continue-on-error: true

      - name: Upload Playwright artifacts on failure
        if: steps.playwright-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Fail if Playwright tests failed
        if: steps.playwright-tests.outcome == 'failure'
        run: exit 1

      - name: Package extension
        run: npm run package

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-vsix
          path: '*.vsix'
          retention-days: 7

      - name: Publish to VS Code Marketplace (from release)
        if: success() && startsWith(github.ref, 'refs/tags/') && matrix.node-version == '22.x'
        run: npm run deploy
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to VS Code Marketplace (auto-increment)
        if: success() && github.event.inputs.publish != 'none' && github.event.inputs.publish != '' && matrix.node-version == '22.x'
        run: npm run deploy:${{ github.event.inputs.publish }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
